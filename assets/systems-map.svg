<svg width="1400" height="720" viewBox="0 0 1400 720" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Systems Architecture Map</title>
  <desc id="desc">A dark technical map showing AI systems layers from interface through cloud and observability.</desc>
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1400" y2="720" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0A0E14"/>
      <stop offset="0.56" stop-color="#0D1117"/>
      <stop offset="1" stop-color="#111821"/>
    </linearGradient>
    <linearGradient id="trace" x1="186" y1="170" x2="1230" y2="556" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7DD3FC" stop-opacity="0.12"/>
      <stop offset="0.52" stop-color="#7DD3FC" stop-opacity="0.70"/>
      <stop offset="1" stop-color="#F6C56F" stop-opacity="0.36"/>
    </linearGradient>
    <pattern id="microgrid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" stroke="#E6EDF3" stroke-opacity="0.032"/>
    </pattern>
  </defs>

  <rect width="1400" height="720" rx="10" fill="url(#panel)"/>
  <rect width="1400" height="720" rx="10" fill="url(#microgrid)"/>
  <rect x="42" y="42" width="1316" height="636" rx="8" stroke="#E6EDF3" stroke-opacity="0.12"/>

  <text x="76" y="93" fill="#7DD3FC" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" letter-spacing="3">ARCHITECTURE MAP / AI-NATIVE SYSTEMS</text>
  <text x="76" y="133" fill="#F8FAFC" font-family="Segoe UI, ui-sans-serif, system-ui, sans-serif" font-size="28" font-weight="650">Layered reasoning from interface to cloud execution</text>
  <text x="76" y="163" fill="#93A4B7" font-family="Segoe UI, ui-sans-serif, system-ui, sans-serif" font-size="16">A technical index for retrieval, orchestration, services, persistence, deployment, and failure visibility.</text>

  <path d="M184 512C304 312 444 225 604 250C744 272 777 422 920 414C1030 407 1074 304 1212 221" stroke="url(#trace)" stroke-width="1.5"/>
  <path d="M184 512L604 250L920 414L1212 221" stroke="#E6EDF3" stroke-opacity="0.08"/>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="11" letter-spacing="1.4">
    <text x="152" y="548" fill="#7DD3FC">INTERFACE</text>
    <text x="344" y="382" fill="#7DD3FC">ORCHESTRATION</text>
    <text x="548" y="224" fill="#7DD3FC">RETRIEVAL</text>
    <text x="735" y="345" fill="#7DD3FC">SERVICE</text>
    <text x="900" y="451" fill="#7DD3FC">DATA</text>
    <text x="1068" y="341" fill="#7DD3FC">CLOUD</text>
    <text x="1170" y="195" fill="#F6C56F">OBSERVABILITY</text>
  </g>

  <g fill="#0D1117" stroke="#BFF7FF" stroke-opacity="0.38">
    <circle cx="184" cy="512" r="14"/>
    <circle cx="376" cy="372" r="14"/>
    <circle cx="604" cy="250" r="14"/>
    <circle cx="766" cy="355" r="14"/>
    <circle cx="920" cy="414" r="14"/>
    <circle cx="1096" cy="329" r="14"/>
    <circle cx="1212" cy="221" r="14"/>
  </g>
  <g fill="#7DD3FC">
    <circle cx="184" cy="512" r="4"/>
    <circle cx="376" cy="372" r="4"/>
    <circle cx="604" cy="250" r="4"/>
    <circle cx="766" cy="355" r="4"/>
    <circle cx="920" cy="414" r="4"/>
    <circle cx="1096" cy="329" r="4"/>
    <circle cx="1212" cy="221" r="4"/>
  </g>

  <g font-family="Segoe UI, ui-sans-serif, system-ui, sans-serif" font-size="14">
    <rect x="94" y="555" width="234" height="62" rx="8" fill="#0B1017" stroke="#E6EDF3" stroke-opacity="0.11"/>
    <text x="112" y="582" fill="#F8FAFC">React / Next.js / TypeScript</text>
    <text x="112" y="606" fill="#93A4B7">precise user-facing state</text>

    <rect x="286" y="397" width="260" height="62" rx="8" fill="#0B1017" stroke="#E6EDF3" stroke-opacity="0.11"/>
    <text x="304" y="424" fill="#F8FAFC">Gemini / Vertex AI / SEA-LION</text>
    <text x="304" y="448" fill="#93A4B7">model-tool execution loops</text>

    <rect x="524" y="276" width="216" height="62" rx="8" fill="#0B1017" stroke="#E6EDF3" stroke-opacity="0.11"/>
    <text x="542" y="303" fill="#F8FAFC">RAG / Vector Context</text>
    <text x="542" y="327" fill="#93A4B7">grounded knowledge paths</text>

    <rect x="684" y="382" width="244" height="62" rx="8" fill="#0B1017" stroke="#E6EDF3" stroke-opacity="0.11"/>
    <text x="702" y="409" fill="#F8FAFC">Node.js / Express / Auth</text>
    <text x="702" y="433" fill="#93A4B7">durable backend contracts</text>

    <rect x="862" y="448" width="214" height="62" rx="8" fill="#0B1017" stroke="#E6EDF3" stroke-opacity="0.11"/>
    <text x="880" y="475" fill="#F8FAFC">MongoDB / PostgreSQL</text>
    <text x="880" y="499" fill="#93A4B7">queryable system memory</text>

    <rect x="1016" y="356" width="212" height="62" rx="8" fill="#0B1017" stroke="#E6EDF3" stroke-opacity="0.11"/>
    <text x="1034" y="383" fill="#F8FAFC">Docker / GCP / Cloudflare</text>
    <text x="1034" y="407" fill="#93A4B7">deployment and recovery</text>

    <rect x="1120" y="246" width="198" height="62" rx="8" fill="#0B1017" stroke="#F6C56F" stroke-opacity="0.20"/>
    <text x="1138" y="273" fill="#F8FAFC">Checks / Logs / Status</text>
    <text x="1138" y="297" fill="#93A4B7">reasoning under pressure</text>
  </g>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12" fill="#58677A">
    <text x="76" y="651">PRINCIPLE: MAKE MODEL BEHAVIOR OBSERVABLE, SERVICE BOUNDARIES EXPLICIT, AND DEPLOYMENT FAILURE MODES BORING.</text>
  </g>
</svg>
