name: Refresh profile telemetry

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout profile repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Refresh generated telemetry
        run: node scripts/update-profile-telemetry.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: khalshaqzzy

      - name: Commit refreshed telemetry
        run: |
          if [[ -z "$(git status --porcelain)" ]]; then
            echo "Telemetry already current."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md assets/github-telemetry.svg assets/contribution-tiles.svg
          git commit -m "chore: refresh profile telemetry"
          git push
